  - conda-forge
  - defaults
dependencies:
  - python=3.11.9
  - pip=24.0
  - numpy=1.26.4
  - scipy=1.13.0
  - matplotlib>=3.8
  - h5py>=3.10
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pip:
    - pytorch-lightning==2.3.3
    - torchmetrics==1.4.0
    - mne==1.7.1
    - moabb==1.1.0
    - braindecode==0.8.1
    - scikit-learn==1.5.1
    - hydra-core==1.3.2
    - omegaconf==2.3.0
    - rich==13.7.1
    - pytest==7.4.4
    - ruff==0.5.0
    - mypy==1.10.0
